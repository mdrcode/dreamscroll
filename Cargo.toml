[package]
name = "dreamspot"
version = "0.1.0"
edition = "2024"
default-run = "localdev"

[lib]
name = "dreamspot"
path = "src/lib.rs"

[[bin]]
name = "localdev"
path = "src/bin/main_localdev.rs"

[[bin]]
name = "worker"
path = "src/bin/main_worker.rs"

[[bin]]
name = "dsutil"
path = "src/bin/main_util.rs"

[dependencies]
anyhow = "1.0.100"
argh = "0.1.13"
axum = "0.8"
axum-extra = { version = "0.10", features = ["multipart"] }
base64 = "0.21"
chrono = { version = "0.4", features = ["serde"] }
sea-orm = { version = "1.1", features = ["sqlx-sqlite", "runtime-tokio-native-tls", "macros"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tera = "1.19"
tokio = { version = "1", features = ["full"] }
tokio-util = "0.7.17"
tower-http = { version = "0.6", features = ["fs"] }
uuid = { version = "1.0", features = ["v4"] }
webbrowser = "1.0.6"
