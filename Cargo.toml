[package]
name = "transitive"
version = "0.1.0"
edition = "2024"

[dependencies]
rocket = "0.5.0"
rocket-multipart-form-data = "0.10.0"
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
base64 = "0.21"
uuid = { version = "1.0", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
