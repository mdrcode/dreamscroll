[package]
name = "dreamspot"
version = "0.1.0"
edition = "2024"
default-run = "localdev"

[lib]
name = "dreamspot"
path = "src/lib.rs"

[[bin]]
name = "localdev"
path = "src/bin/main_localdev.rs"

[[bin]]
name = "worker"
path = "src/bin/main_worker.rs"

[dependencies]
base64 = "0.21"
chrono = { version = "0.4", features = ["serde"] }
rocket = "0.5.0"
rocket-multipart-form-data = "0.10.0"
rocket_dyn_templates = { version = "0.1.0", features = ["tera"] }
sea-orm = { version = "1.1", features = ["sqlx-sqlite", "runtime-tokio-native-tls", "macros"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
tokio-util = "0.7.17"
uuid = { version = "1.0", features = ["v4"] }
