# gcloud builds submit --config cloudbuild.yaml
steps:
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker pull us-central1-docker.pkg.dev/mdrcode/dreamscroll-repo/dreamscroll-web:latest || true
        docker build \
          --cache-from us-central1-docker.pkg.dev/mdrcode/dreamscroll-repo/dreamscroll-web:latest \
          -t us-central1-docker.pkg.dev/mdrcode/dreamscroll-repo/dreamscroll-web:latest \
          .

images:
  - 'us-central1-docker.pkg.dev/mdrcode/dreamscroll-repo/dreamscroll-web:latest'