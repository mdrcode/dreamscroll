# Build with both `latest` and an immutable tag.
#
# Typical manual usage:
# (bash/zsh):
# gcloud builds submit --config cloudbuild.yaml --substitutions=_IMAGE_TAG=$(git rev-parse --short HEAD)
# (fish):
# gcloud builds submit --config cloudbuild.yaml --substitutions=_IMAGE_TAG=(git rev-parse --short HEAD)
#
# If substitutions are not provided, defaults below are used.
substitutions:
  _IMAGE_TAG: 'manual'
  _LOCATION: 'us-central1'
  _REPOSITORY: 'dreamscroll-repo'
  _IMAGE_NAME: 'dreamscroll-web'

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--platform'
      - 'linux/amd64'
      - '-t'
      - '${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:latest'
      - '-t'
      - '${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:${_IMAGE_TAG}'
      - '.'

images:
  - '${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:latest'
  - '${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:${_IMAGE_TAG}'