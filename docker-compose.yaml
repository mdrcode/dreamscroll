services:
  app:
    build:
      context: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env # .gitignored for secrets like JWT_SECRET_KEY
    environment:
      PORT: 8080
      RUST_LOG: info
      DB_BACKEND: postgres
      PUBSUB_PROJECT_ID: ${PUBSUB_PROJECT_ID:-dreamscroll-local}
      PUBSUB_TOPIC_ID: ${PUBSUB_TOPIC_ID:-dreamscroll-illumination}
      PUBSUB_API_BASE_URL: http://pubsub-emulator:8085
      # The POSTGRES_ vars should be defined in a .gitignored `.env` file.
      # This URL is defined twice: (1) in .env, (for locally running via
      # `cargo run`) it is defined to reference localhost. But here in 
      # docker-compose.yaml, it is redefined to point to the "db" service
      # defined below.
      DB_URL_POSTGRES: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      STORAGE_BACKEND: gcloud
      STORAGE_GCLOUD_EMULATOR_ENDPOINT: http://fake-gcs:4443
      STORAGE_GCLOUD_BUCKET_NAME: "dreamscroll-dev-media1"

    # Cute way to import/export data from the docker environment
    volumes:
      - ${EXPORT_DIR:-~/Documents/dreamscroll_export}:/app/export

    depends_on:
      db:
        condition: service_healthy
      fake-gcs:
        condition: service_started
      pubsub-emulator:
        condition: service_started

  db:
    image: postgres:18
    restart: always
    shm_size: 128mb
    env_file:
      - .env
    # These should be defined in .env
    # POSTGRES_USER
    # POSTGRES_PASSWORD
    # POSTGRES_DB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}", "-q" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Fake-GCS server for local emulation of Google Cloud Storage. 
  #
  # NOTE, if you get "Not Found" errors when attempting to upload to emulator
  # You probably need to create the bucket manually, since the emulator
  # apparently does not (always?) automatically create the bucket for you.
  # After `docker compose up fake-gcs`, can run:
  #
  # curl -X POST -H "Content-Type: application/json" \
  #   http://localhost:4443/storage/v1/b \
  #   -d '{"name": "dreamscroll-dev-media1"}'
  #
  # You can list current buckets with:
  # curl http://localhost:4443/storage/v1/b

  fake-gcs:
    image: fsouza/fake-gcs-server:latest
    restart: unless-stopped
    ports:
      - "4443:4443"
    volumes:
      - gcloud_storage_data:/storage
    command: -scheme http -data /storage
    # This was super flaky, just forget it
    # healthcheck:
    #   test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4443//_internal/healthcheck" ]
    #   interval: 10s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 5s

    # Google Pub/Sub emulator for local testing of push subscriptions.
    #
    # After `docker compose up pubsub-emulator app`, initialize topic/subscription:
    # ./localdev/pubsub_init.sh
    #
    # The default push endpoint targets the app container route:
    # /webhook/illumination/push
    #
    # Note: `/webhook` is a path convention only; not a network boundary.
    # In localdev we intentionally allow unauthenticated pushes to this path.
  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    restart: unless-stopped
    command: >-
      gcloud beta emulators pubsub start --project=${PUBSUB_PROJECT_ID:-dreamscroll-local} --host-port=0.0.0.0:8085
    ports:
      - "8085:8085"

volumes:
  gcloud_storage_data:
  postgres_data:


